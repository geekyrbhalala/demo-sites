name: Deploy Demo Websites

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.filter.outputs.infra }}
      site1_changed: ${{ steps.filter.outputs.savoria }}
      site2_changed: ${{ steps.filter.outputs.luxe }}
      site3_changed: ${{ steps.filter.outputs.crestview }}
      site4_changed: ${{ steps.filter.outputs.inkcraft }}
      site5_changed: ${{ steps.filter.outputs.apex }}
      site6_changed: ${{ steps.filter.outputs.zenflow }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infrastructure/**'
            savoria:
              - 'websites/savoria-restaurant/**'
            luxe:
              - 'websites/luxe-salon-spa/**'
            crestview:
              - 'websites/crestview-financial/**'
            inkcraft:
              - 'websites/inkcraft-tattoo/**'
            apex:
              - 'websites/apex-auto-detail/**'
            zenflow:
              - 'websites/zenflow-yoga/**'

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init

      - name: Terraform Validate
        working-directory: infrastructure
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infrastructure
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        working-directory: infrastructure
        run: |
          echo "## Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY

  deploy-savoria:
    name: Deploy Savoria Restaurant
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure]
    if: |
      always() &&
      (needs.detect-changes.outputs.site1_changed == 'true' || needs.detect-changes.outputs.infra_changed == 'true') &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: websites/savoria-restaurant/package-lock.json

      - name: Install Dependencies
        working-directory: websites/savoria-restaurant
        run: npm ci

      - name: Build
        working-directory: websites/savoria-restaurant
        run: npm run build

      - name: Deploy to S3
        working-directory: websites/savoria-restaurant
        run: aws s3 sync dist/ s3://savoria-restaurant-demo --delete --region $AWS_REGION

  deploy-luxe:
    name: Deploy Luxe Salon & Spa
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure]
    if: |
      always() &&
      (needs.detect-changes.outputs.site2_changed == 'true' || needs.detect-changes.outputs.infra_changed == 'true') &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: websites/luxe-salon-spa/package-lock.json

      - name: Install Dependencies
        working-directory: websites/luxe-salon-spa
        run: npm ci

      - name: Build
        working-directory: websites/luxe-salon-spa
        run: npm run build

      - name: Deploy to S3
        working-directory: websites/luxe-salon-spa
        run: aws s3 sync dist/ s3://luxe-salon-spa-demo --delete --region $AWS_REGION

  deploy-crestview:
    name: Deploy Crestview Financial
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure]
    if: |
      always() &&
      (needs.detect-changes.outputs.site3_changed == 'true' || needs.detect-changes.outputs.infra_changed == 'true') &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: websites/crestview-financial/package-lock.json

      - name: Install Dependencies
        working-directory: websites/crestview-financial
        run: npm ci

      - name: Build
        working-directory: websites/crestview-financial
        run: npm run build

      - name: Deploy to S3
        working-directory: websites/crestview-financial
        run: aws s3 sync dist/ s3://crestview-financial-demo --delete --region $AWS_REGION

  deploy-inkcraft:
    name: Deploy Inkcraft Tattoo
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure]
    if: |
      always() &&
      (needs.detect-changes.outputs.site4_changed == 'true' || needs.detect-changes.outputs.infra_changed == 'true') &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: websites/inkcraft-tattoo/package-lock.json

      - name: Install Dependencies
        working-directory: websites/inkcraft-tattoo
        run: npm ci

      - name: Build
        working-directory: websites/inkcraft-tattoo
        run: npm run build

      - name: Deploy to S3
        working-directory: websites/inkcraft-tattoo
        run: aws s3 sync dist/ s3://inkcraft-tattoo-demo --delete --region $AWS_REGION

  deploy-apex:
    name: Deploy Apex Auto Detail
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure]
    if: |
      always() &&
      (needs.detect-changes.outputs.site5_changed == 'true' || needs.detect-changes.outputs.infra_changed == 'true') &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: websites/apex-auto-detail/package-lock.json

      - name: Install Dependencies
        working-directory: websites/apex-auto-detail
        run: npm ci

      - name: Build
        working-directory: websites/apex-auto-detail
        run: npm run build

      - name: Deploy to S3
        working-directory: websites/apex-auto-detail
        run: aws s3 sync dist/ s3://apex-auto-detail-demo --delete --region $AWS_REGION

  deploy-zenflow:
    name: Deploy Zenflow Yoga
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-infrastructure]
    if: |
      always() &&
      (needs.detect-changes.outputs.site6_changed == 'true' || needs.detect-changes.outputs.infra_changed == 'true') &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: websites/zenflow-yoga/package-lock.json

      - name: Install Dependencies
        working-directory: websites/zenflow-yoga
        run: npm ci

      - name: Build
        working-directory: websites/zenflow-yoga
        run: npm run build

      - name: Deploy to S3
        working-directory: websites/zenflow-yoga
        run: aws s3 sync dist/ s3://zenflow-yoga-demo --delete --region $AWS_REGION

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-savoria, deploy-luxe, deploy-crestview, deploy-inkcraft, deploy-apex, deploy-zenflow]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          SAVORIA_STATUS="${{ needs.deploy-savoria.result }}"
          LUXE_STATUS="${{ needs.deploy-luxe.result }}"
          CRESTVIEW_STATUS="${{ needs.deploy-crestview.result }}"
          INKCRAFT_STATUS="${{ needs.deploy-inkcraft.result }}"
          APEX_STATUS="${{ needs.deploy-apex.result }}"
          ZENFLOW_STATUS="${{ needs.deploy-zenflow.result }}"

          get_badge() {
            case "$1" in
              success) echo "✅ Deployed" ;;
              skipped) echo "⏭️ Skipped" ;;
              failure) echo "❌ Failed" ;;
              cancelled) echo "🚫 Cancelled" ;;
              *) echo "⏭️ Skipped" ;;
            esac
          }

          cat >> $GITHUB_STEP_SUMMARY << 'HEADER'
          ## 🚀 Deployment Summary

          | Website | Status | URL |
          |---------|--------|-----|
          HEADER

          echo "| Savoria Restaurant | $(get_badge $SAVORIA_STATUS) | http://savoria-restaurant-demo.s3-website-us-east-1.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Luxe Salon & Spa | $(get_badge $LUXE_STATUS) | http://luxe-salon-spa-demo.s3-website-us-east-1.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Crestview Financial | $(get_badge $CRESTVIEW_STATUS) | http://crestview-financial-demo.s3-website-us-east-1.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Inkcraft Tattoo Studio | $(get_badge $INKCRAFT_STATUS) | http://inkcraft-tattoo-demo.s3-website-us-east-1.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Apex Auto Detail | $(get_badge $APEX_STATUS) | http://apex-auto-detail-demo.s3-website-us-east-1.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Zenflow Yoga & Wellness | $(get_badge $ZENFLOW_STATUS) | http://zenflow-yoga-demo.s3-website-us-east-1.amazonaws.com |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Deployed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> $GITHUB_STEP_SUMMARY
